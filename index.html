<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>프리퍼 스탭 스케줄러</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="프리퍼">
<meta name="theme-color" content="#1e3a5f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Paperlogy';src:url('./fonts/Paperlogy-4Regular.ttf') format('truetype');font-weight:400;font-style:normal}
@font-face{font-family:'Paperlogy';src:url('./fonts/Paperlogy-7Bold.ttf') format('truetype');font-weight:700;font-style:normal}
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}
body{font-family:'Paperlogy','Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a2332;-webkit-tap-highlight-color:transparent;font-size:15px}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 1px 3px rgba(30,58,95,.05)}
.card-s{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px}
.inp{background:#f8fafc;border:1px solid #cbd5e1;color:#1a2332;border-radius:8px;padding:8px 10px;font-size:14px;transition:.2s;font-family:inherit;width:100%}
.inp:focus{outline:none;border-color:#1e3a5f;box-shadow:0 0 0 3px rgba(30,58,95,.08)}
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit;white-space:nowrap}
.btn-p{background:#1e3a5f;color:#fff}.btn-p:hover{background:#15304f}
.btn-s{background:#e8edf3;color:#1e3a5f}.btn-s:hover{background:#dce3ed}
.btn-d{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.btn-d:hover{background:#fee2e2}
.btn-g{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}.btn-g:hover{background:#d1fae5}
.btn-w{background:#fffbeb;color:#b45309;border:1px solid #fde68a}.btn-w:hover{background:#fef3c7}

.tab-btn{padding:9px 16px;border-radius:12px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:inherit}
.tab-btn.on{background:#1e3a5f;color:#fff;box-shadow:0 2px 10px rgba(30,58,95,.2)}
.tab-btn:not(.on):hover{background:#e8edf3;color:#1e3a5f}

.sec-title{font-size:16px;font-weight:700;color:#1e3a5f;display:flex;align-items:center;gap:6px}
.label{font-size:13px;color:#64748b;margin-bottom:3px;display:block;font-weight:500}

.sch-cell{padding:6px 5px;border-bottom:1px solid #e2e8f0;border-right:1px solid #edf2f7;text-align:center;vertical-align:middle;font-size:13px}
.sch-cell:last-child{border-right:none}
.sch-cell.drop-over{background:#dbeafe!important;box-shadow:inset 0 0 0 2px #3b82f6}
.sch-tag{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;margin:1px;cursor:grab;transition:all .15s;border:none!important;white-space:nowrap}
.sch-tag:active{cursor:grabbing}
.sch-tag.dragging-tag{opacity:.35}
.sch-tag.unmapped{opacity:.7}
.sch-tag.mapped{box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sch-tag.highlight{outline:3px solid #1e3a5f;outline-offset:1px;transform:scale(1.15);z-index:10;position:relative}
#schTable.dimmed .sch-tag:not(.highlight){opacity:.2}
#schTable{border-spacing:0;width:100%;table-layout:auto;border-collapse:collapse}
#schTable thead th{background:#f0f4f8;border-bottom:2px solid #cbd5e1;border-right:1px solid #e2e8f0;padding:8px 5px;font-size:12px;letter-spacing:.3px}
#schTable thead th:last-child{border-right:none}
#schTable tbody tr:nth-child(even) td{background:#fafbfd}
#schTable tbody tr:hover td{background:#f0f4ff}
#schTable td.sch-cell{padding:5px 4px;min-width:70px;vertical-align:middle}
#schTable td.sch-cell:first-child{min-width:75px;white-space:nowrap;border-right:2px solid #cbd5e1}

.name-chip{padding:6px 12px;border-radius:9px;font-size:13px;font-weight:700;cursor:grab;user-select:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.name-chip.used{cursor:pointer}

.late-badge{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.ontime-badge{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}

#toast{position:fixed;bottom:20px;right:20px;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast>div{background:#1e3a5f;color:#fff;border-radius:12px;padding:12px 20px;font-size:14px;box-shadow:0 4px 20px rgba(30,58,95,.25);display:flex;align-items:center;gap:8px}

.collapse-btn{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
.collapse-btn .arrow{transition:transform .2s;font-size:10px}
.collapse-btn.open .arrow{transform:rotate(90deg)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards}

/* 모바일 최적화 */
@media(max-width:768px){
  body{font-size:16px}
  .tab-btn{padding:9px 14px;font-size:13px}
  .card{border-radius:12px}
  .sch-cell{padding:8px 5px;font-size:14px}
  .sch-tag{padding:5px 10px;font-size:13px}
  .name-chip{padding:7px 12px;font-size:14px}
  .inp{font-size:16px;padding:10px 12px}
  .btn{padding:10px 16px;font-size:14px}
  .sec-title{font-size:16px}
  .label{font-size:13px}
  #schTable th{font-size:13px;padding:8px 4px}
  #schTable td{padding:8px 4px;min-width:90px!important}
}
@media(max-width:400px){
  body{font-size:15px}
  .tab-btn{padding:8px 10px;font-size:12px}
  .sch-tag{padding:4px 8px;font-size:12px}
  #schTable td{min-width:70px!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-[100] px-3 py-2 shadow-sm">
  <div class="max-w-[1200px] mx-auto flex items-center justify-between flex-wrap gap-2">
    <div class="flex items-center gap-2.5">
      <div class="flex flex-col leading-tight">
        <span class="font-bold text-[#1e3a5f] tracking-wider" style="font-size:22px">PREFER</span>
        <span style="font-family:'Dancing Script',cursive;font-size:16px;color:#64748b;margin-top:-3px">STAFF scheduler</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <nav class="flex gap-1" id="tabs">
        <button class="tab-btn on" data-t="main">📋 스케줄 생성</button>
        <button class="tab-btn" data-t="att">📝 출결 확인</button>
      </nav>
      <button onclick="quickSave()" class="btn btn-p py-[10px] px-[18px]" style="font-size:14px">💾 저장</button>
      <div class="relative" id="exportWrap" style="display:none">
        <button onclick="document.getElementById('exportMenu').classList.toggle('hidden')" class="btn btn-s py-[10px] px-[14px]" style="font-size:14px">📥 내보내기</button>
        <div id="exportMenu" class="hidden absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 py-1" style="min-width:120px">
          <button onclick="downloadPNG();document.getElementById('exportMenu').classList.add('hidden')" class="block w-full text-left px-3 py-2 text-sm hover:bg-gray-50">📸 PNG 저장</button>
          <button onclick="downloadPDF();document.getElementById('exportMenu').classList.add('hidden')" class="block w-full text-left px-3 py-2 text-sm hover:bg-gray-50">📄 PDF 저장</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="max-w-[1200px] mx-auto p-3">

<!-- ======================== TAB: 메인 (설정+스케줄+저장 통합) ======================== -->
<section id="p-main" class="tab-p fade-up">

  <!-- 1) 저장 목록 (최상단) -->
  <div class="card p-4 mb-3">
    <div class="collapse-btn open" onclick="toggleSection('saveBody',this)">
      <span class="arrow">▶</span>
      <h3 class="sec-title text-sm">💾 저장 목록</h3>
      <span id="saveCount" class="text-xs text-[#94a3b8] ml-auto"></span>
    </div>
    <div id="saveBody" class="mt-2">
      <div class="flex gap-2 flex-wrap items-end mb-3">
        <input type="text" id="saveName" class="inp" style="flex:1;min-width:140px" placeholder="저장 이름 (예: 3/21 금요일)">
        <button onclick="saveSlot()" class="btn btn-p py-2 px-4 text-sm">💾 저장</button>
      </div>
      <div id="saveList"></div>
    </div>
  </div>

  <!-- 2) 설정 접기/펼치기 -->
  <div class="card p-4 mb-3">
    <div class="collapse-btn open" onclick="toggleSection('setupBody',this)">
      <span class="arrow">▶</span>
      <h2 class="text-base font-bold text-[#1e3a5f]">⚙️ 설정</h2>
    </div>
    <div id="setupBody" class="mt-3">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <!-- 설정 (좌 50%) -->
        <div class="card-s p-3">
          <div class="grid grid-cols-3 gap-2 mb-3">
            <div><label class="label">오픈</label><select id="selOpen" class="inp"></select></div>
            <div><label class="label">마감</label><select id="selClose" class="inp"></select></div>
            <div><label class="label">총 시간</label><div class="p-2 rounded-lg bg-blue-50 text-sm text-[#1e3a5f] text-center font-bold"><span id="lblHours">9</span>시간</div></div>
          </div>
          <div class="grid grid-cols-3 gap-2 mb-3">
            <div><label class="label">총원</label><input type="number" id="inpStaffCount" value="10" min="1" max="50" class="inp" onchange="rebuildStaff()"></div>
            <div><label class="label">상시 최소</label><input type="number" id="inpFixed" value="7" min="0" class="inp"></div>
            <div><label class="label">교대 최대 파트</label><input type="number" id="inpMaxP" value="2" min="1" max="8" class="inp"></div>
          </div>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <div><label class="label">1인 휴게(분)</label><input type="number" id="inpRest" value="120" min="0" step="5" class="inp"></div>
            <div><label class="label">휴게 단위(분)</label><input type="number" id="inpRestUnit" value="60" min="5" step="5" class="inp"></div>
          </div>
          <div id="restRecommend" class="p-1.5 rounded-lg bg-indigo-50 text-[11px] text-[#1e3a5f]">💡 <span id="restRecText">-</span></div>
          <button onclick="applyGlobalRest()" class="btn btn-s text-[11px] py-1 px-3 mt-2 w-full">휴게 전원 일괄적용</button>
        </div>
        <!-- 구역 (우 50%) -->
        <div class="card-s p-3">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-bold text-[#1e3a5f]">📍 구역</span>
            <button onclick="addZone()" class="btn btn-p text-xs py-1 px-2">+ 추가</button>
          </div>
          <div id="zoneList" class="space-y-1.5"></div>
        </div>
      </div>
      <!-- 인원 목록 숨김 (데이터용) -->
      <div id="staffList" class="hidden"></div>
    </div>
  </div>

  <!-- 3) 스케줄 생성 바 -->
  <div class="card p-4 mb-3">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div class="flex gap-2 items-center flex-wrap">
        <select id="selRestMode" class="inp text-sm py-2" style="width:auto" onchange="S.restMode=this.value;autoSave();">
          <option value="smart">🧠 AI 분산</option>
          <option value="rotate">🔄 순번 밀어내기</option>
          <option value="push">⏩ 전체 밀어내기</option>
        </select>
        <button onclick="genSchedule()" class="btn btn-p py-2.5 px-5">🤖 자동 생성</button>
      </div>
    </div>
  </div>

  <div id="ruleBox" class="card p-3 mb-3 hidden">
    <h3 class="sec-title mb-2 text-sm">✅ 규칙 검증</h3>
    <div id="ruleGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-1"></div>
  </div>

  <!-- 4) 이름배치 + 미배치 + 요약 (가로 3등분) -->
  <div id="nameBankWrap" class="card p-4 mb-3 hidden">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-1">
      <h3 class="sec-title text-sm">👥 이름 배치</h3>
      <div class="flex gap-1">
        <button onclick="autoAssignNames()" class="btn btn-g text-[11px] py-1 px-2">🤖 자동배치</button>
        <button onclick="sortNames()" class="btn btn-s text-[11px] py-1 px-2">가나다순</button>
        <button onclick="addNameEntry()" class="btn btn-s text-[11px] py-1 px-2">+ 추가</button>
        <button onclick="toggleBulkPaste()" class="btn btn-s text-[11px] py-1 px-2">✏️ 개별입력</button>
        <button onclick="clearAllNames()" class="btn btn-d text-[11px] py-1 px-2">초기화</button>
      </div>
    </div>
    <div id="bulkPasteWrap" class="mb-2">
      <textarea id="bulkPasteArea" class="inp text-sm" rows="2" placeholder="이름 붙여넣기 (엑셀, 쉼표, 줄바꿈)" lang="ko"></textarea>
      <button onclick="applyBulkPaste()" class="btn btn-p text-xs py-1.5 px-4 mt-1">적용</button>
    </div>
    <div id="nameInputs" class="flex flex-wrap gap-1.5 mb-3 hidden"></div>
    <div class="mb-1"><span class="text-xs font-bold text-[#1e3a5f]" id="unassignedLabel">📌 미배치</span></div>
    <div id="nameChipsUnassigned" class="flex flex-wrap gap-1.5 min-h-[36px] p-2 rounded-lg bg-blue-50 border border-blue-100 mb-2"></div>
    <div class="mb-1"><span class="text-xs font-bold text-[#059669]" id="assignedLabel">✅ 배치 완료</span></div>
    <div id="nameChipsAssigned" class="flex flex-wrap gap-1.5 min-h-[36px] p-2 rounded-lg bg-emerald-50 border border-emerald-100 mb-2"></div>
    <div id="summaryWrap"></div>
    <div id="mapStatus" class="mt-2 pt-2 border-t border-[#e2e8f0] text-xs text-[#64748b]"></div>
  </div>

  <!-- 5) 스케줄 테이블 -->
  <div class="card p-3 overflow-x-auto" id="schWrap">
    <div id="schOut"><p class="text-center text-[#94a3b8] py-10">🤖 자동 생성 버튼을 눌러 스케줄을 만드세요.</p></div>
  </div>
</section>

<!-- ======================== TAB: 출결 ======================== -->
<section id="p-att" class="tab-p hidden">
  <div class="card p-4 mb-3">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <h2 class="text-base font-bold text-[#1e3a5f]">📝 출결 관리</h2>
      <div class="flex items-center gap-2">
        <label class="label mb-0">기준</label>
        <input type="time" id="attendBase" value="10:30" class="inp" style="width:110px" onchange="renderAtt()">
        <button onclick="resetAtt()" class="btn btn-d text-xs py-1.5">↺</button>
      </div>
    </div>
  </div>
  <div id="lateSummary" class="card p-3 mb-3 hidden border-l-4 border-l-red-400">
    <h3 class="text-sm font-bold text-red-600 mb-2">⚠️ 지각자</h3>
    <div id="lateList" class="space-y-1"></div>
  </div>
  <div class="card p-3"><div id="attList"></div></div>
</section>

</main>

<div id="toast"><div></div></div>

<script>
// ===== CONSTANTS =====
const CODES=[];for(let i=1;i<=50;i++)CODES.push(String(i));
const CL=['#1e3a5f','#b45309','#059669','#dc2626','#7c3aed','#0891b2','#c2410c','#be185d','#4d7c0f','#0d9488','#9f1239','#7e22ce'];
const PASTEL=['#dbeafe','#fef3c7','#d1fae5','#fee2e2','#ede9fe','#cffafe','#ffedd5','#fce7f3','#ecfccb','#ccfbf1','#ffe4e6','#f3e8ff'];

// ===== STATE =====
let _initDone=false;
let S={
  openH:11, closeH:20, restMin:120, restUnit:60, maxParts:2, fixedCount:7, restMode:'smart',
  zones:[{name:'리셉션',color:CL[0],min:2},{name:'Fair Zone',color:CL[1],min:3},{name:'F&B',color:CL[2],min:2}],
  staff:[],
  nameMap:{},
  nameEntries:[],
  nextNameId:0,
  sch:null,
  attend:{},
};

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  buildTimeOpts(); bindTabs();
  const loaded=autoLoad();
  if(!loaded){ rebuildStaff(); renderZones(); renderStaff(); renderRestGrid(); initAtt(); renderAtt(); }
  bindInputs();
  renderSaveList();
  _initDone=true;
  if(!loaded){ cloudPull(); }
});

// ===== UI HELPERS =====
function toggleSection(id,btn){
  const el=document.getElementById(id);
  if(el.style.display==='none'){el.style.display='';btn.classList.add('open');}
  else{el.style.display='none';btn.classList.remove('open');}
}

function bindTabs(){
  document.querySelectorAll('#tabs .tab-btn').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('#tabs .tab-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      document.querySelectorAll('.tab-p').forEach(x=>x.classList.add('hidden'));
      document.getElementById('p-'+b.dataset.t).classList.remove('hidden');
      if(b.dataset.t==='att')renderAtt();
    };
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dn(code){return S.nameMap[code]||code;}
function getPosition(code){
  if(!S.sch||!S.sch.length)return code+'번';
  // 전체 시간대에서 가장 많이 배치된 구역 반환
  const count={};
  S.sch.forEach(sl=>{
    for(const[zone,arr]of Object.entries(sl.pa)){if(arr.includes(code))count[zone]=(count[zone]||0)+1;}
  });
  const best=Object.entries(count).sort((a,b)=>b[1]-a[1])[0];
  return best?best[0]:code+'번';
}
function codeColor(code){const i=S.staff.findIndex(s=>s.code===code);return CL[(i>=0?i:0)%CL.length];}

function buildTimeOpts(){
  const o=document.getElementById('selOpen'),c=document.getElementById('selClose');
  for(let h=0;h<=23;h++){const t=`${String(h).padStart(2,'0')}:00`;
    o.innerHTML+=`<option value="${h}" ${h===11?'selected':''}>${t}</option>`;
    c.innerHTML+=`<option value="${h}" ${h===20?'selected':''}>${t}</option>`;}
  // 마감: 익일 새벽 (25=01시, 26=02시, ..., 29=05시)
  for(let h=24;h<=29;h++){const display=`익일 ${String(h-24).padStart(2,'0')}:00`;
    c.innerHTML+=`<option value="${h}">${display}</option>`;}
}

function bindInputs(){
  const u=()=>{
    S.openH=+document.getElementById('selOpen').value;
    S.closeH=+document.getElementById('selClose').value;
    S.restMin=+document.getElementById('inpRest').value;
    S.restUnit=+document.getElementById('inpRestUnit').value;
    S.maxParts=+document.getElementById('inpMaxP').value;
    S.fixedCount=+document.getElementById('inpFixed').value;
    S.restMode=document.getElementById('selRestMode').value;
    document.getElementById('lblHours').textContent=S.closeH-S.openH;
    calcRestRec();autoSave();
  };
  ['selOpen','selClose','inpRest','inpRestUnit','inpMaxP','inpFixed','inpStaffCount'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.addEventListener('change',u);});
  u();
}

function timeSlots(){const a=[];for(let h=S.openH;h<S.closeH;h++){const dh=h>=24?h-24:h;a.push(`${String(dh).padStart(2,'0')}:00`);}return a;}
function fmtHour(h){const dh=h>=24?h-24:h;return `${String(dh).padStart(2,'0')}:00`;}

function calcRestRec(){
  const totalH=S.closeH-S.openH;
  const N=S.staff.length||+document.getElementById('inpStaffCount').value;
  const spare=N-S.fixedCount;
  const legalMin=Math.floor(totalH/4)*30;
  const maxRestMin=spare>0?Math.floor((spare*totalH)/N)*60:0;
  const rec=Math.max(legalMin,Math.floor(maxRestMin/5)*5);
  const el=document.getElementById('restRecText');
  if(el){
    if(spare<=0) el.innerHTML=`<span class="text-red-600">여유 인력 없음</span>`;
    else el.innerHTML=`1인당 최대 <b>${rec}분</b> (법정 ${legalMin}분, 여유 ${spare}명)`;
  }
  // 상시 인원/운영시간 변경 시 자동 계산하여 반영
  if(rec>0){S.restMin=rec;document.getElementById('inpRest').value=rec;S.staff.forEach(s=>s.restMin=rec);}
}

// ===== SCHEDULE GENERATION =====
function genSchedule(){
  const ts=timeSlots();const T=ts.length;
  if(T<2){toast('⚠️','운영시간 부족');return;}
  const all=S.staff.map(s=>s.code);const N=all.length;
  const totalMinReq=S.zones.reduce((s,z)=>s+z.min,0);
  const minWorking=Math.max(totalMinReq,S.fixedCount);
  const maxRestPerSlot=Math.max(1,N-minWorking);

  const restPlan={};all.forEach(n=>restPlan[n]=[]);
  const slotLoad=new Array(T).fill(0);

  if(S.restMode==='rotate'){
    const dayOffset=new Date().getDate()%N;
    const order=[];for(let i=0;i<N;i++)order.push(all[(i+dayOffset)%N]);
    let cursor=0;
    for(let si=0;si<T;si++){
      let restThisSlot=0;
      while(restThisSlot<maxRestPerSlot&&cursor<order.length){
        const code=order[cursor%N];
        const st=S.staff.find(s=>s.code===code);
        const blocks=Math.round((st?.restMin||0)/S.restUnit);
        if(restPlan[code].length<blocks){restPlan[code].push(si);slotLoad[si]++;restThisSlot++;}
        cursor++;if(cursor>=N*T)break;
      }
    }
  }else if(S.restMode==='push'){
    const dayOffset=new Date().getDate()%N;
    const needs={};all.forEach(c=>{const st=S.staff.find(s=>s.code===c);needs[c]=Math.round((st?.restMin||0)/S.restUnit);});
    const order=[];for(let i=0;i<N;i++)order.push(all[(i+dayOffset)%N]);
    const groups=[];for(let i=0;i<N;i+=maxRestPerSlot)groups.push(order.slice(i,i+maxRestPerSlot));
    let gi=0;
    for(let si=0;si<T;si++){
      const grp=groups[gi%groups.length];
      for(const code of grp){if(restPlan[code].length<needs[code]){restPlan[code].push(si);slotLoad[si]++;}}
      gi++;
    }
    for(const code of all){
      while(restPlan[code].length<needs[code]){
        let bestSi=-1,bestLoad=Infinity;
        for(let si=0;si<T;si++){if(restPlan[code].includes(si))continue;if(slotLoad[si]<bestLoad&&N-(slotLoad[si]+1)>=minWorking){bestLoad=slotLoad[si];bestSi=si;}}
        if(bestSi<0)break;restPlan[code].push(bestSi);slotLoad[bestSi]++;
      }
      restPlan[code].sort((a,b)=>a-b);
    }
  }else{
    // smart (AI 분산) - 필요 블록이 많은 사람부터 배정
    const staffByNeed=[...S.staff].map(st=>({code:st.code,blocks:Math.round(st.restMin/S.restUnit)}))
      .filter(s=>s.blocks>0).sort((a,b)=>b.blocks-a.blocks);
    for(const{code,blocks}of staffByNeed){
      if(blocks>=T){toast('⚠️',`${code}번 휴게>운영시간`);return;}
      const assigned=[];
      for(let att=0;att<500&&assigned.length<blocks;att++){
        let best=-1,bestSc=-1e9;
        for(let i=0;i<T;i++){
          if(assigned.includes(i))continue;
          if(slotLoad[i]>=maxRestPerSlot)continue;
          if(N-(slotLoad[i]+1)<minWorking)continue;
          let sc=0;
          if(!assigned.some(a=>Math.abs(a-i)===1))sc+=10;
          if(assigned.length>0)sc+=Math.min(...assigned.map(a=>Math.abs(a-i)))*2;
          sc-=slotLoad[i]*5;
          sc+=Math.random()*1.5;
          if(sc>bestSc){bestSc=sc;best=i;}
        }
        if(best>=0){assigned.push(best);slotLoad[best]++;}else break;
      }
      if(assigned.length<blocks){
        // 제약 완화하여 재시도
        for(let i=0;i<T&&assigned.length<blocks;i++){
          if(!assigned.includes(i)&&slotLoad[i]<maxRestPerSlot){
            assigned.push(i);slotLoad[i]++;
          }
        }
      }
      restPlan[code]=assigned.sort((a,b)=>a-b);
    }
  }

  const schedule=[];
  const rpt={};S.staff.filter(s=>s.type==='rotate').forEach(s=>rpt[s.code]=new Set());
  for(let si=0;si<T;si++){
    const time=ts[si];const resting=all.filter(n=>restPlan[n].includes(si));const working=all.filter(n=>!restPlan[n].includes(si));
    const pa={};S.zones.forEach(z=>pa[z.name]=[]);
    const unpl=[...working];
    for(const z of S.zones){while(pa[z.name].length<z.min&&unpl.length){
      let pick=-1;for(let u=0;u<unpl.length;u++){if(rpt[unpl[u]]&&rpt[unpl[u]].size>=S.maxParts&&!rpt[unpl[u]].has(z.name))continue;pick=u;break;}
      if(pick<0&&unpl.length)pick=0;if(pick<0)break;const n=unpl.splice(pick,1)[0];pa[z.name].push(n);if(rpt[n])rpt[n].add(z.name);}}
    const support=[];for(const n of unpl){let ok=false;for(const z of S.zones){const cap=z.min+2;if(pa[z.name].length<cap){if(rpt[n]&&rpt[n].size>=S.maxParts&&!rpt[n].has(z.name))continue;pa[z.name].push(n);if(rpt[n])rpt[n].add(z.name);ok=true;break;}}if(!ok)support.push(n);}
    schedule.push({time,pa,rest:resting,support});
  }
  S.sch=schedule;

  if(!S.nameEntries.length){for(let i=0;i<S.staff.length;i++)S.nameEntries.push({id:S.nextNameId++,name:''});}

  document.getElementById('nameBankWrap').classList.remove('hidden');
  document.getElementById('exportWrap').style.display='';

  renderSchTable();renderNameBank();validateRules();autoSave();
  // 설정 + 저장목록 접기
  document.querySelectorAll('.collapse-btn.open').forEach(btn=>{
    const id=btn.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
    if(id){const el=document.getElementById(id);if(el){el.style.display='none';btn.classList.remove('open');}}
  });
  toast('✅','스케줄 생성 완료!');
}

function makeTag(code,si,from,bg,fg){
  const mapped=!!S.nameMap[code];const col=codeColor(code);
  const idx=S.staff.findIndex(s=>s.code===code);
  const pastel=PASTEL[(idx>=0?idx:0)%PASTEL.length];
  if(!bg){
    if(mapped){bg=pastel;fg=col;}
    else{bg='transparent';fg='#94a3b8';}
  }
  return `<span class="sch-tag ${mapped?'mapped':'unmapped'}" draggable="true" data-code="${code}" data-si="${si}" data-from="${from}"
    style="background:${bg};color:${fg}${!mapped&&!arguments[3]?';border:1px dashed #cbd5e1!important':''}" data-dn="${code}">${dn(code)}</span>`;
}
function dash(){return '<span class="text-gray-300 text-xs">-</span>';}

function renderSummary(){
  const w=document.getElementById('summaryWrap');if(!w||!S.sch)return;
  let h=`<h4 class="text-xs font-bold text-[#1e3a5f] mb-2">📊 요약</h4><div class="grid grid-cols-2 gap-1.5">`;

    h+=`<div class="p-1.5 rounded-lg bg-white border text-[10px] flex items-center justify-between" style="border-color:${col}30">
      <span class="font-bold" style="color:${col}" data-dn="${s.code}">${dn(s.code)}</span>
      <span class="text-[#64748b] text-right">${wc}h 휴${rc*S.restUnit}분</span></div>`;});
  h+=`</div>`;
  w.innerHTML=h;
}

function bindSchDnD(){
  document.querySelectorAll('#schTable .sch-tag').forEach(tag=>{
    tag.addEventListener('dragover',e=>{
      if(e.dataTransfer.types.includes('text/name')){e.preventDefault();e.dataTransfer.dropEffect='copy';
        tag.style.transform='scale(1.15)';tag.style.boxShadow='0 0 12px rgba(30,58,95,.3)';}
    });
    tag.addEventListener('dragleave',()=>{tag.style.transform='';tag.style.boxShadow='';});
    tag.addEventListener('drop',e=>{
      tag.style.transform='';tag.style.boxShadow='';
      const name=e.dataTransfer.getData('text/name');
      if(!name)return;e.preventDefault();
      const targetCode=tag.dataset.code;
      for(const c in S.nameMap){if(S.nameMap[c]===name)S.nameMap[c]='';}
      S.nameMap[targetCode]=name;
      renderSchTags();renderNameChips();renderMapStatus();autoSave();
      toast('✅',`${targetCode}번 → "${name}"`);
    });

    // 1클릭: 하이라이트 / 더블클릭: 배치 해제
    tag.addEventListener('click',e=>{
      e.stopPropagation();
      highlightPerson(tag.dataset.code);
    });
    tag.addEventListener('dblclick',e=>{
      e.stopPropagation();
      const code=tag.dataset.code;
      if(S.nameMap[code]){
        const name=S.nameMap[code];S.nameMap[code]='';
        _highlightCode=null;
        renderSchTags();renderNameChips();renderMapStatus();autoSave();
        const tbl=document.getElementById('schTable');if(tbl)tbl.classList.remove('dimmed');
        toast('↩️',`"${name}" 배치 해제`);
      }
    });

    tag.addEventListener('dragstart',e=>{
      if(e.dataTransfer.types.includes('text/name'))return;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/move',JSON.stringify({code:tag.dataset.code,si:+tag.dataset.si,from:tag.dataset.from}));
      tag.classList.add('dragging-tag');
    });
    tag.addEventListener('dragend',()=>tag.classList.remove('dragging-tag'));
  });

  document.querySelectorAll('.sch-drop').forEach(cell=>{
    cell.addEventListener('dragover',e=>{
      if(e.dataTransfer.types.includes('text/move')){e.preventDefault();e.dataTransfer.dropEffect='move';cell.classList.add('drop-over');}
    });
    cell.addEventListener('dragleave',()=>cell.classList.remove('drop-over'));
    cell.addEventListener('drop',e=>{
      cell.classList.remove('drop-over');
      const raw=e.dataTransfer.getData('text/move');if(!raw)return;e.preventDefault();
      const{code,si:fromSi,from}=JSON.parse(raw);
      const toSi=+cell.dataset.si;const toCol=cell.dataset.col;
      if(fromSi!==toSi){toast('⚠️','같은 시간대 내에서만 이동');return;}
      if(from===toCol)return;
      const sl=S.sch[toSi];
      if(from==='__rest__')sl.rest=sl.rest.filter(c=>c!==code);
      else if(from==='__support__')sl.support=sl.support.filter(c=>c!==code);
      else if(sl.pa[from])sl.pa[from]=sl.pa[from].filter(c=>c!==code);
      if(toCol==='__rest__')sl.rest.push(code);
      else if(toCol==='__support__')sl.support.push(code);
      else if(sl.pa[toCol])sl.pa[toCol].push(code);
      renderSchTable();renderNameBank();autoSave();
      toast('✅',`${dn(code)} 이동 완료`);
    });
  });
}

// ===== DOWNLOAD =====
async function downloadPNG(){
  toast('📸','생성 중...');
  const wrap=document.getElementById('schWrap');
  // 다운로드 시 테이블 너비 고정
  const tbl=document.getElementById('schTable');
  if(tbl)tbl.style.tableLayout='fixed';
  const c=await html2canvas(wrap,{backgroundColor:'#fff',scale:2,useCORS:true,logging:false,
    width:wrap.scrollWidth,windowWidth:wrap.scrollWidth+40});
  if(tbl)tbl.style.tableLayout='';
  const a=document.createElement('a');a.download=`스케줄_${new Date().toISOString().slice(0,10)}.png`;a.href=c.toDataURL();a.click();
  toast('✅','PNG 완료');
}
async function downloadPDF(){
  toast('📄','생성 중...');
  const wrap=document.getElementById('schWrap');
  const tbl=document.getElementById('schTable');
  if(tbl)tbl.style.tableLayout='fixed';
  const c=await html2canvas(wrap,{backgroundColor:'#fff',scale:2,useCORS:true,logging:false,
    width:wrap.scrollWidth,windowWidth:wrap.scrollWidth+40});
  if(tbl)tbl.style.tableLayout='';
  const d=c.toDataURL('image/png');const{jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:c.width>c.height?'l':'p',unit:'px',format:[c.width,c.height]});
  pdf.addImage(d,'PNG',0,0,c.width,c.height);pdf.save(`스케줄_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('✅','PDF 완료');
}

// ===== RULES =====
function validateRules(){
  if(!S.sch)return;
  // 상시 인원 체크
  const r1fail=S.sch.filter(sl=>Object.values(sl.pa).flat().length<S.fixedCount);
  const r1={name:'상시 인원',ok:!r1fail.length,reason:r1fail.length?`${r1fail[0].time} 등 ${r1fail.length}개 시간대 미달`:''};
  // 개인 휴게
  const r2fail=S.staff.filter(s=>{const rc=S.sch.filter(sl=>sl.rest.includes(s.code)).length;return rc*S.restUnit!==s.restMin;});
  const r2={name:'개인 휴게',ok:!r2fail.length,reason:r2fail.length?`${r2fail.map(s=>dn(s.code)).slice(0,3).join(',')} 등 ${r2fail.length}명 미충족`:''};
  // 연속 휴게
  const r3fail=S.staff.filter(s=>{let c=0;for(const sl of S.sch){if(sl.rest.includes(s.code)){c++;if(c>=3)return true;}else c=0;}return false;});
  const r3={name:'연속 휴게 방지',ok:!r3fail.length,reason:r3fail.length?`${r3fail.map(s=>dn(s.code)).join(',')} 3연속 휴게`:''};
  // 근무/휴게 분리
  const r4fail=S.sch.filter(sl=>{const w=Object.values(sl.pa).flat();return w.some(n=>sl.rest.includes(n));});
  const r4={name:'근무/휴게 분리',ok:!r4fail.length,reason:r4fail.length?`${r4fail[0].time} 중복 배치`:''};
  const rules=[r1,r2,r3,r4];
  const g=document.getElementById('ruleGrid');g.innerHTML='';
  rules.forEach(r=>{g.innerHTML+=`<div class="flex items-center justify-between gap-2 p-1.5 rounded-lg ${r.ok?'bg-green-50':'bg-red-50'} text-xs font-medium">
    <span class="${r.ok?'text-green-700':'text-red-700'}">${r.ok?'✅':'⚠️'} ${r.name}</span>
    ${r.reason?`<span class="text-red-500 text-[10px]">${r.reason}</span>`:''}</div>`;});
  document.getElementById('ruleBox').classList.remove('hidden');
}

// ===== ATTENDANCE =====
function initAtt(){S.staff.forEach(s=>{if(!S.attend[s.code])S.attend[s.code]={in:false,time:null,mod:false};});}
function resetAtt(){S.attend={};initAtt();renderAtt();autoSave();toast('↺','출결 초기화');}
function checkIn(code){const now=new Date();S.attend[code]={in:true,time:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,mod:false};renderAtt();autoSave();toast('✅',`${dn(code)} 출근`);}
function editAtt(code){const cur=S.attend[code]?.time||'';const v=prompt(`${dn(code)} 출근 시간 (HH:MM):`,cur);if(v&&/^\d{2}:\d{2}$/.test(v)){S.attend[code]={in:true,time:v,mod:true};renderAtt();autoSave();}}
function cancelIn(code){S.attend[code]={in:false,time:null,mod:false};renderAtt();autoSave();}
function lateMin(t,b){if(!t)return 0;const[ah,am]=t.split(':').map(Number);const[bh,bm]=b.split(':').map(Number);return(ah*60+am)-(bh*60+bm);}
function renderAtt(){
  const base=document.getElementById('attendBase').value||'10:30';
  const lates=S.staff.filter(s=>{const a=S.attend[s.code];return a&&a.in&&lateMin(a.time,base)>0;});
  const ls=document.getElementById('lateSummary');const ll=document.getElementById('lateList');
  if(lates.length){ls.classList.remove('hidden');ll.innerHTML='';
    lates.forEach(s=>{const a=S.attend[s.code];const m=lateMin(a.time,base);const col=codeColor(s.code);
      ll.innerHTML+=`<div class="flex items-center justify-between card-s p-2">
        <div class="flex items-center gap-2"><div class="w-6 h-6 rounded flex items-center justify-center text-xs font-bold text-white" style="background:${col}">${s.code}</div>
        <span class="text-sm font-bold">${dn(s.code)}</span><span class="late-badge">+${m}분</span></div>
        <span class="text-xs text-[#64748b]">${a.time}</span></div>`;});
  }else ls.classList.add('hidden');
  const w=document.getElementById('attList');
  let h=`<table class="w-full"><thead><tr><th class="sch-cell text-left text-xs text-[#64748b]">이름</th><th class="sch-cell text-xs text-[#64748b]">상태</th><th class="sch-cell text-xs text-[#64748b]">시간</th><th class="sch-cell text-xs text-[#64748b]">지각</th><th class="sch-cell text-xs text-[#64748b]">관리</th></tr></thead><tbody>`;
  S.staff.forEach((s,i)=>{const a=S.attend[s.code]||{in:false};const col=CL[i%CL.length];const late=a.in&&lateMin(a.time,base)>0;const lm=a.in?lateMin(a.time,base):0;
    h+=`<tr class="hover:bg-slate-50">
      <td class="sch-cell text-left"><div class="flex items-center gap-1.5"><div class="w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold text-white" style="background:${col}">${s.code}</div><span class="text-sm font-medium">${dn(s.code)}</span>${a.mod?'<span class="text-[9px] text-amber-600">(수정)</span>':''}</div></td>
      <td class="sch-cell text-center">${a.in?'<span class="ontime-badge">출근</span>':'<span class="text-[#94a3b8] text-xs">-</span>'}</td>
      <td class="sch-cell text-center font-mono text-sm">${a.time||'-'}</td>
      <td class="sch-cell text-center">${a.in?(late?`<span class="late-badge">+${lm}분</span>`:'<span class="ontime-badge">정시</span>'):'-'}</td>
      <td class="sch-cell text-center"><div class="flex justify-center gap-1">
        ${!a.in?`<button onclick="checkIn('${s.code}')" class="btn btn-g text-[10px] py-1 px-2">✓</button>`:''}
        ${a.in?`<button onclick="editAtt('${s.code}')" class="btn btn-w text-[10px] py-1 px-1.5">✏️</button><button onclick="cancelIn('${s.code}')" class="btn btn-d text-[10px] py-1 px-1.5">✕</button>`:''}
      </div></td></tr>`;});
  h+=`</tbody></table>`;
  const total=S.staff.length;const chk=S.staff.filter(s=>S.attend[s.code]?.in).length;
  h+=`<div class="mt-3 p-3 rounded-xl card-s flex items-center justify-around flex-wrap gap-2">
    <div class="text-center"><div class="text-lg font-bold text-[#1e3a5f]">${total}</div><div class="text-[10px] text-[#64748b]">전체</div></div>
    <div class="text-center"><div class="text-lg font-bold text-emerald-600">${chk}</div><div class="text-[10px] text-[#64748b]">출근</div></div>
    <div class="text-center"><div class="text-lg font-bold text-[#94a3b8]">${total-chk}</div><div class="text-[10px] text-[#64748b]">미출근</div></div>
    <div class="text-center"><div class="text-lg font-bold text-red-600">${lates.length}</div><div class="text-[10px] text-[#64748b]">지각</div></div></div>`;
  w.innerHTML=h;
}

// ===== TOAST =====
function toast(icon,msg){const t=document.getElementById('toast');t.innerHTML=`<div>${icon} ${msg}</div>`;t.className='show';clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2500);}

// ===== SAVE / LOAD =====
const LS_AUTO='spaceSch_auto';
const LS_SLOTS='spaceSch_slots';

function getSerializableState(){
  return {openH:S.openH,closeH:S.closeH,restMin:S.restMin,restUnit:S.restUnit,
    maxParts:S.maxParts,fixedCount:S.fixedCount,restMode:S.restMode,
    zones:S.zones,staff:S.staff,nameMap:S.nameMap,
    nameEntries:S.nameEntries,nextNameId:S.nextNameId,sch:S.sch,attend:S.attend};
}

function autoSave(){
  if(!_initDone)return;
  try{localStorage.setItem(LS_AUTO,JSON.stringify(getSerializableState()));}catch(e){}
  schedulePush();
}

function autoLoad(){
  try{const raw=localStorage.getItem(LS_AUTO);if(!raw)return false;return applyState(JSON.parse(raw));}catch(e){return false;}
}

function applyState(d){
  if(!d||!d.zones)return false;
  S.openH=d.openH??11;S.closeH=d.closeH??18;
  S.restMin=d.restMin??120;S.restUnit=d.restUnit??60;
  S.maxParts=d.maxParts??2;S.fixedCount=d.fixedCount??7;
  S.restMode=d.restMode||'smart';
  S.zones=d.zones||[];S.staff=d.staff||[];
  S.nameMap=d.nameMap||{};S.nameEntries=d.nameEntries||[];
  S.nextNameId=d.nextNameId||0;S.sch=d.sch||null;S.attend=d.attend||{};
  // 기존 ㄱㄴㄷ 코드를 숫자로 마이그레이션
  const oldCodes=['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','ㄲ','ㄸ','ㅃ','ㅆ','ㅉ'];
  if(S.staff.length&&oldCodes.includes(S.staff[0].code)){
    const codeMap={};
    S.staff.forEach((s,i)=>{const newCode=String(i+1);codeMap[s.code]=newCode;s.code=newCode;});
    const newNameMap={};for(const[k,v]of Object.entries(S.nameMap)){newNameMap[codeMap[k]||k]=v;}S.nameMap=newNameMap;
    const newAttend={};for(const[k,v]of Object.entries(S.attend)){newAttend[codeMap[k]||k]=v;}S.attend=newAttend;
    if(S.sch){S.sch.forEach(sl=>{
      sl.rest=sl.rest.map(c=>codeMap[c]||c);
      sl.support=sl.support.map(c=>codeMap[c]||c);
      for(const z in sl.pa){sl.pa[z]=sl.pa[z].map(c=>codeMap[c]||c);}
    });}
  }
  document.getElementById('selOpen').value=S.openH;
  document.getElementById('selClose').value=S.closeH;
  document.getElementById('inpRest').value=S.restMin;
  document.getElementById('inpRestUnit').value=S.restUnit;
  document.getElementById('inpMaxP').value=S.maxParts;
  document.getElementById('inpFixed').value=S.fixedCount;
  document.getElementById('selRestMode').value=S.restMode;
  document.getElementById('lblHours').textContent=S.closeH-S.openH;
  if(!S.staff.length){
    const n=+document.getElementById('inpStaffCount').value||10;
    for(let i=0;i<n;i++){const code=CODES[i];
      S.staff.push({code,type:i<S.fixedCount?'fixed':'rotate',restMin:S.restMin});
      if(!S.nameMap[code])S.nameMap[code]='';}
  }
  document.getElementById('inpStaffCount').value=S.staff.length;
  renderZones();renderStaff();renderRestGrid();initAtt();renderAtt();
  if(S.sch){
    document.getElementById('nameBankWrap').classList.remove('hidden');
    document.getElementById('exportWrap').style.display='';
    renderSchTable();renderNameBank();validateRules();
  }
  return true;
}

function getSaveSlots(){try{return JSON.parse(localStorage.getItem(LS_SLOTS)||'[]');}catch(e){return[];}}
function setSaveSlots(arr){try{localStorage.setItem(LS_SLOTS,JSON.stringify(arr));}catch(e){}}

function quickSave(){
  const now=new Date();
  const name=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const slots=getSaveSlots();
  slots.unshift({name,date:now.toISOString(),data:getSerializableState()});
  setSaveSlots(slots);renderSaveList();toast('💾',`저장 완료`);
}
function saveSlot(){
  const nameEl=document.getElementById('saveName');
  let name=(nameEl.value||'').trim();
  if(!name){const now=new Date();name=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;}
  const slots=getSaveSlots();
  const existing=slots.findIndex(s=>s.name===name);
  if(existing>=0){if(!confirm(`"${name}" 덮어쓸까요?`))return;slots[existing]={name,date:new Date().toISOString(),data:getSerializableState()};}
  else{slots.unshift({name,date:new Date().toISOString(),data:getSerializableState()});}
  setSaveSlots(slots);nameEl.value='';renderSaveList();toast('💾',`"${name}" 저장`);
}
function loadSlot(idx){
  const slots=getSaveSlots();if(!slots[idx])return;
  if(!confirm(`"${slots[idx].name}" 불러올까요?`))return;
  autoSave();applyState(slots[idx].data);autoSave();toast('📂','불러오기 완료');
}
function deleteSlot(idx){
  const slots=getSaveSlots();if(!slots[idx])return;
  if(!confirm(`삭제할까요?`))return;
  slots.splice(idx,1);setSaveSlots(slots);renderSaveList();toast('🗑️','삭제');
}
function renameSlot(idx){
  const slots=getSaveSlots();if(!slots[idx])return;
  const n=prompt('새 이름:',slots[idx].name);if(!n?.trim())return;
  slots[idx].name=n.trim();setSaveSlots(slots);renderSaveList();
}
function renderSaveList(){
  const slots=getSaveSlots();const w=document.getElementById('saveList');
  const cnt=document.getElementById('saveCount');if(cnt)cnt.textContent=`${slots.length}개`;
  if(!slots.length){w.innerHTML='<p class="text-center text-[#94a3b8] py-4 text-sm">저장된 스케줄이 없습니다.</p>';return;}
  let h='';
  slots.forEach((sl,i)=>{
    const d=new Date(sl.date);
    const ds=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const sn=sl.data?.staff?.length||0;const mn=sl.data?.nameMap?Object.values(sl.data.nameMap).filter(v=>v).length:0;
    h+=`<div class="card-s p-3 mb-1.5 flex items-center justify-between flex-wrap gap-2">
      <div><div class="text-sm font-bold text-[#1e3a5f]">${sl.name}</div>
        <div class="text-[10px] text-[#94a3b8]">${ds} · ${sn}명 · 매핑 ${mn}/${sn}</div></div>
      <div class="flex gap-1">
        <button onclick="loadSlot(${i})" class="btn btn-p text-xs py-1.5 px-3">📂 불러오기</button>
        <button onclick="renameSlot(${i})" class="btn btn-w text-xs py-1.5 px-3">✏️ 이름변경</button>
        <button onclick="deleteSlot(${i})" class="btn btn-d text-xs py-1.5 px-3">🗑️ 삭제</button>
      </div></div>`;
  });
  w.innerHTML=h;
}

// ===== AUTO CLOUD =====
let _pushTimer=null;
async function cloudPush(){
  try{
    const payload={v:1,current:getSerializableState(),slots:getSaveSlots(),updated:new Date().toISOString()};
    await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }catch(e){}
}
async function cloudPull(){
  try{
    const res=await fetch('/api/data');if(!res.ok)return false;
    const data=await res.json();
    if(!data.v||!data.current)return false;
    applyState(data.current);autoSave();
    if(data.slots?.length){
      const existing=getSaveSlots();const names=new Set(existing.map(s=>s.name));
      data.slots.forEach(sl=>{if(!names.has(sl.name))existing.unshift(sl);});
      setSaveSlots(existing);
    }
    renderSaveList();return true;
  }catch(e){return false;}
}
function schedulePush(){clearTimeout(_pushTimer);_pushTimer=setTimeout(()=>cloudPush(),2000);}
